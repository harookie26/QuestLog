<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QuestLog - Demo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom styles -->
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="page-wrap d-flex flex-column min-vh-100">
      <!-- Header -->
      <header class="site-header bg-accent text-white fixed-top">
        <div class="container-fluid px-4">
          <div class="d-flex align-items-center py-2">
            <div class="me-3 logo">QuestLog</div>

            <div class="flex-grow-1 d-flex justify-content-center">
              <form class="search-form w-50">
                <div class="input-group rounded-pill bg-white overflow-hidden shadow-sm">
                  <input type="text" class="form-control border-0" placeholder="Search Game Titles" aria-label="Search">
                  <button class="btn btn-accent border-0 px-3" type="submit"><i class="bi bi-search"></i></button>
                </div>
              </form>
            </div>

            <nav class="ms-3 d-none d-md-flex align-items-center">
              <a class="nav-link link-light px-3" href="#">HOME</a>
              <a class="nav-link link-light px-3" href="#">BOARDS</a>
              <a class="nav-link link-light px-3" href="#">GAMES</a>
              <a class="nav-link link-light px-3" href="#">PLATFORM</a>
              <div class="ms-3 d-flex align-items-center user-area">
                <i class="bi bi-bell me-2 small"></i>
                <div class="user-avatar bg-white text-accent d-flex align-items-center justify-content-center">U</div>
                <i class="bi bi-chevron-down ms-2"></i>
              </div>
            </nav>
          </div>
        </div>
      </header>

      <!-- Main content (big white area) -->
      <main class="flex-grow-1 bg-white">
        <div class="container-fluid py-5">
          <div class="content-blank"></div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="site-footer bg-accent text-dark mt-auto">
        <div class="container py-4">
          <div class="row align-items-start">
            <div class="col-12 col-md-4 mb-3 mb-md-0">
              <h6 class="fw-bold">QuestLog</h6>
              <p class="mb-2 text-muted">Descriptive line about what your company does.</p>
              <div class="d-flex gap-2 social-icons">
                <a href="#" class="text-decoration-none text-dark"><i class="bi bi-instagram"></i></a>
                <a href="#" class="text-decoration-none text-dark"><i class="bi bi-linkedin"></i></a>
                <a href="#" class="text-decoration-none text-dark"><i class="bi bi-x"></i></a>
              </div>
            </div>

            <div class="col-12 col-md-8">
              <div class="d-flex flex-column flex-md-row justify-content-md-end gap-4">
                <div class="footer-col">
                  <h6 class="fw-bold small">Features</h6>
                  <ul class="list-unstyled small text-muted mb-0">
                    <li><a href="#" class="text-muted text-decoration-none">Core features</a></li>
                    <li><a href="#" class="text-muted text-decoration-none">Pro experience</a></li>
                    <li><a href="#" class="text-muted text-decoration-none">Integrations</a></li>
                  </ul>
                </div>

                <div class="footer-col">
                  <h6 class="fw-bold small">Learn more</h6>
                  <ul class="list-unstyled small text-muted mb-0">
                    <li><a href="#" class="text-muted text-decoration-none">Blog</a></li>
                    <li><a href="#" class="text-muted text-decoration-none">Case studies</a></li>
                    <li><a href="#" class="text-muted text-decoration-none">Customer stories</a></li>
                  </ul>
                </div>

                <div class="footer-col">
                  <h6 class="fw-bold small">Support</h6>
                  <ul class="list-unstyled small text-muted mb-0">
                    <li><a href="#" class="text-muted text-decoration-none">Contact</a></li>
                    <li><a href="#" class="text-muted text-decoration-none">Support</a></li>
                    <li><a href="#" class="text-muted text-decoration-none">Legal</a></li>
                  </ul>
                </div>
              </div>
            </div>
          </div>

          <div class="row mt-3">
            <div class="col-12 small text-muted">&copy; 2026 QuestLog. All rights reserved.</div>
          </div>
        </div>
      </footer>
    </div>

    <!-- Bootstrap JS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
